name: Bug Report
description: Report a problem with this project
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version or commit are you using?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Environment, logs, screenshots, anything else relevant.
